name: Update All Campus Calendars

on:
  schedule:
    # 08:00 UTC every Monday = 04:00 EDT / 03:00 EST
    - cron: "0 8 * * 1"
  # Allow manual runs from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-calendar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Install Playwright Chromium (with OS dependencies)
        run: playwright install chromium --with-deps

      # continue-on-error: a single blocked/broken source must not prevent
      # the other campuses' fresh data from being committed below.
      - name: Run UTM scraper
        continue-on-error: true
        run: python scripts/calendar/scrape_utm.py

      - name: Run UTSC scraper
        continue-on-error: true
        run: python scripts/calendar/scrape_utsc.py

      - name: Run ArtsCI scraper
        continue-on-error: true
        run: python scripts/calendar/scrape_artsci.py

      - name: Run program-event filter (experimental)
        run: python scripts/calendar/filter_ics.py

      - name: Commit and push updated ICS files (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/calendar/utm.ics data/calendar/utsc.ics data/calendar/artsci.ics
          git add data/calendar/utm-filtered.ics data/calendar/utsc-filtered.ics data/calendar/artsci-filtered.ics
          if git diff --staged --quiet; then
            echo "ℹ No changes to commit — all calendars are already up to date."
          else
            git commit -m "chore: update all campus calendars [$(date -u +%Y-%m-%d)]"
            # Retry to survive races with concurrent pushes to main:
            # a plain `git push` is rejected ("fetch first") whenever main has
            # advanced since checkout, which fails the scheduled run.
            for attempt in 1 2 3 4 5; do
              if git push; then
                echo "✓ Pushed on attempt $attempt"
                exit 0
              fi
              echo "⚠ Push rejected (attempt $attempt) — rebasing onto latest main and retrying"
              git pull --rebase origin main
            done
            echo "✗ Failed to push after multiple attempts" >&2
            exit 1
          fi
