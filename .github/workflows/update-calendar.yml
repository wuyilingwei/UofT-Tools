name: Update All Campus Calendars

on:
  schedule:
    # 08:00 UTC daily = 04:00 EDT / 03:00 EST
    - cron: "0 8 * * *"
  # Allow manual runs from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-calendar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Install Playwright Chromium (with OS dependencies)
        run: playwright install chromium --with-deps

      - name: Run UTM scraper
        run: python scripts/scrape_utm.py

      - name: Run UTSC scraper
        run: python scripts/scrape_utsc.py

      - name: Run ArtsCI scraper
        run: python scripts/scrape_artsci.py

      - name: Commit and push updated ICS files (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ics/utm.ics docs/ics/utsc.ics docs/ics/artsci.ics
          if git diff --staged --quiet; then
            echo "ℹ No changes to commit — all calendars are already up to date."
          else
            git commit -m "chore: update all campus calendars [$(date -u +%Y-%m-%d)]"
            git push
          fi

