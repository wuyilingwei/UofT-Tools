name: Update Planner Data

on:
  schedule:
    # Twice-monthly: catches Summer timetable (~late Feb) on Mar 1
    # and Fall-Winter timetable (~early Jun) on Jun 15, each with a
    # conservative delay after UofT's enrolment start-time post dates.
    - cron: "0 6 1,15 * *"
  # Allow manual runs at any time
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-planner:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Scrape UTM program requirements
        run: python scripts/scrape_utm_programs.py

      - name: Scrape UTM course prerequisites and exclusions
        run: python scripts/scrape_utm_courses.py

      - name: Scrape TTB course timetable (UTM)
        run: python scripts/scrape_ttb_courses.py

      - name: Commit and push updated planner data (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/planner/data/
          if git diff --staged --quiet; then
            echo "ℹ No changes to commit — planner data is already up to date."
          else
            git commit -m "chore: update planner data [$(date -u +%Y-%m-%d)]"
            git push
          fi
